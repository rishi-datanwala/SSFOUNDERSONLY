name = "smartsound-session-limiter"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV namespace binding — create this in Cloudflare dashboard first
# then paste the namespace ID below
[[kv_namespaces]]
binding = "SESSION_LIMIT"
id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"

[vars]
ENVIRONMENT = "production"
